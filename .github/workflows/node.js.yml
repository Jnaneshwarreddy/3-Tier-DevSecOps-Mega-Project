# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1

    steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: set up nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '23'
      
      - name: compile front-end code (syntax check)
        run: |
          cd client
          find . -name "*.js" -exec node --check {} +
      - name: compile back-end code (syntax check)
        run: |
          cd api
          find . -name "*.js" -exec node --check {} + 

  gitleaks-scan:
     runs-on: Agent-1
     needs: compile

     steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: gitleaks setup
        uses: gitleaks/gitleaks-action@v2

      - name: gitleaks scan
        run: |
          gitleaks detect --source ./client --exit-code 1
          gitleaks detect --source ./api --exit-code 1
      

  trivy_fs_scan:
        runs-on: Agent-1
        needs: gitleaks-scan
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        env:
          # Injects proxy configuration to the action container so it can sync its CVE databases
          HTTP_PROXY: "http://172.18.86.19:8080"
          HTTPS_PROXY: "http://172.18.86.19:8080"
          NO_PROXY: "localhost,127.0.0.1,github.com"
          with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
             
          
        
        
        

