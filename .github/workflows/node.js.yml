# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1

    steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: set up nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '23'
      
      - name: compile front-end code (syntax check)
        run: |
          cd client
          find . -name "*.js" -exec node --check {} +
      - name: compile back-end code (syntax check)
        run: |
          cd api
          find . -name "*.js" -exec node --check {} + 

  gitleaks-scan:
     runs-on: Agent-1
     needs: compile

     steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: gitleaks setup
        uses: gitleaks/gitleaks-action@v2

      - name: gitleaks scan
        run: |
          gitleak detect --source ./client --exit-code 1
          gitleak detect --source ./api --exit-code 1
        
        
        

